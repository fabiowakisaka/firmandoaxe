<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1c1208;--bg2:#261a0a;--bg3:#311f0c;--bg4:#3d2610;
  --border:rgba(220,170,80,.15);--border2:rgba(220,170,80,.30);
  --amber:#e09b30;--amber2:#f5c050;--amber-dim:rgba(224,155,48,.12);
  --terra:#c4572a;--terra2:#e06a38;--cream:#f5ead0;
  --text:#ede0c4;--muted:#8a7458;--green:#5a8a4a;
  --font-head:"Playfair Display",serif;
  --font-body:"Lato",sans-serif;
  --font-mono:"Space Mono",monospace;
  --radius:14px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(200,100,30,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 30% at 80% 100%,rgba(180,80,20,.10) 0%,transparent 50%);pointer-events:none;z-index:0}

/* HEADER */
.header{text-align:center;padding:44px 20px 20px;position:relative;z-index:1}
.header-eyebrow{font-family:var(--font-mono);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--amber);opacity:.75;margin-bottom:10px}
.header h1{font-family:var(--font-head);font-size:clamp(26px,7vw,42px);font-weight:600;font-style:italic;color:var(--cream);text-shadow:0 2px 24px rgba(200,120,30,.35);line-height:1.15}
.header h1 span{color:var(--amber2);font-style:normal}
.header-sub{font-size:14px;color:var(--muted);margin-top:8px;font-weight:300}
.header-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--amber),transparent);margin:16px auto 0;opacity:.5}

/* VELAS */
.candle-row{display:flex;justify-content:center;gap:20px;padding:16px 0 28px;position:relative;z-index:1}
.candle{display:flex;flex-direction:column;align-items:center}
.flame{width:9px;height:16px;background:radial-gradient(ellipse at 50% 80%,#fff8e0 0%,#ffc030 35%,#e06010 75%,transparent 100%);border-radius:50% 50% 25% 25%;animation:flicker 2s ease-in-out infinite alternate;filter:blur(.3px)}
.candle-body{width:11px;height:32px;border-radius:2px}
.candle-body::after{content:"";display:block;width:100%;height:100%;border-radius:2px;background:linear-gradient(90deg,rgba(255,255,255,.12) 0%,transparent 50%)}
.c1 .candle-body,.c5 .candle-body{background:linear-gradient(180deg,#c83020,#7a1810)}
.c2 .candle-body,.c4 .candle-body{background:linear-gradient(180deg,#e8dfc0,#a89870)}
.c3 .candle-body{background:linear-gradient(180deg,#4070c0,#1a3870)}
.c1 .flame{animation-delay:0s}.c2 .flame{animation-delay:.4s}.c3 .flame{animation-delay:.8s}.c4 .flame{animation-delay:.2s}.c5 .flame{animation-delay:.6s}

@keyframes flicker{0%{transform:scaleX(1) scaleY(1);opacity:1}30%{transform:scaleX(.82) scaleY(1.12) translateX(1px);opacity:.9}60%{transform:scaleX(1.12) scaleY(.9) translateX(-1px);opacity:1}100%{transform:scaleX(.95) scaleY(1.05);opacity:.95}}

/* LAYOUT */
.main{max-width:580px;margin:0 auto;padding:0 16px 80px;position:relative;z-index:1}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
