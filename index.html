<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Firmando Axé — Oferenda Digital</title>
<meta name="description" content="Faça sua oferenda virtual com respeito às tradições de Umbanda e Candomblé. Escolha o local no mapa e envie seu pedido.">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght=0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #080705;
  --bg2:       #100e0b;
  --bg3:       #1a1712;
  --border:    rgba(255,220,130,0.12);
  --gold:      #d4a832;
  --gold2:     #f0c84a;
  --white:     #f0ead6;
  --text-dim:  #a09888;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Crimson Pro', serif;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.cinzel { font-family: 'Cinzel Decorative', serif; }
.mono { font-family: 'Space Mono', monospace; }

header {
  background: linear-gradient(to bottom, #000, var(--bg2));
  border-bottom: 1px solid var(--border);
  padding: 1.5rem;
  text-align: center;
}
header h1 { color: var(--gold); font-size: 1.6rem; letter-spacing: 2px; }
header p { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.2rem; }

.app-container {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 1.5rem;
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.5rem;
  flex-grow: 1;
}
@media (min-width: 900px) {
  .app-container { grid-template-columns: 420px 1fr; }
}

.painel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  justify-content: space-between;
}

.instrucoes {
  background: var(--bg3);
  padding: 1rem;
  border-radius: 8px;
  font-size: 0.9rem;
  border-left: 3px solid var(--gold);
  color: var(--text-dim);
  line-height: 1.4;
}

textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  padding: 1rem;
  font-family: inherit;
  font-size: 1rem;
  resize: none;
}
textarea:focus { outline: 1px solid var(--gold); }

.categorias-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
}
.cat-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 0.6rem;
  border-radius: 8px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  text-align: center;
  transition: all 0.2s;
}
.cat-btn.active {
  border-color: var(--gold);
  color: var(--gold2);
  background: rgba(212,168,50,0.08);
}

.btn-firmar {
  width: 100%;
  background: linear-gradient(135deg, #8a2518, #4a120b);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--white);
  padding: 1rem;
  border-radius: 12px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  letter-spacing: 1px;
}
.btn-firmar:hover { opacity: 0.9; }
.btn-firmar:disabled { opacity: 0.4; cursor: not-allowed; }

.mapa-wrapper {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0.5rem;
  min-height: 450px;
}
#map {
  width: 100%;
  height: 100%;
  min-height: 500px;
  border-radius: 12px;
  background: #111;
}

.sucesso-box {
  background: var(--bg3);
  border: 1px solid var(--gold);
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
}
.share-input-group {
  display: flex;
  margin-top: 1rem;
  gap: 0.5rem;
}
.share-url {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 0.5rem;
  font-size: 0.8rem;
  border-radius: 6px;
  flex-grow: 1;
  color: var(--gold2);
}
.btn-copy {
  background: var(--gold);
  color: var(--bg);
  border: none;
  padding: 0.5rem 1rem;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <h1 class="cinzel">FIRMANDO AXÉ</h1>
  <p>Conectando Fé, Respeito e Tecnologia Ancestral</p>
</header>

<div class="app-container">
  
  <aside class="painel" id="painel-fluxo">
    <div id="fluxo-dados">
      <h2 class="cinzel" style="color: var(--gold); font-size: 1.2rem; margin-bottom: 0.5rem;">Prepare seu Axé</h2>
      
      <div class="instrucoes" id="status-passo" style="margin-bottom: 1rem;">
        📍 <b>Passo 1:</b> Navegue pelo mapa e dê um clique no local exato onde deseja firmar sua oferenda virtual.
      </div>

      <div style="margin-bottom: 1rem;">
        <label class="mono" style="font-size: 0.75rem; color: var(--gold); display:block; margin-bottom: 0.4rem;">1. SELECIONE A VERTENTE (Muda o ícone ao vivo)</label>
        <div class="categorias-grid">
          <div class="cat-btn active" data-cat="caminhos">🌾 Caminhos</div>
          <div class="cat-btn" data-cat="saude">🌿 Saúde</div>
          <div class="cat-btn" data-cat="protecao">🛡️ Proteção</div>
          <div class="cat-btn" data-cat="prosperidade">🪙 Fortuna</div>
          <div class="cat-btn" data-cat="amor">🌹 Amor</div>
          <div class="cat-btn" data-cat="gratidãao">✨ Gratidão</div>
        </div>
      </div>

      <div>
        <label class="mono" style="font-size: 0.75rem; color: var(--gold); display:block; margin-bottom: 0.4rem;">2. DIGITE SUA INTENÇÃO</label>
        <textarea id="pedido-texto" rows="4" placeholder="Escreva sua prece de coração... Os guias conhecem sua verdade."></textarea>
      </div>
    </div>

    <div id="acao-container" style="margin-top: 1rem;">
      <button class="btn-firmar" id="btn-acao-principal" disabled>Aguardando clique no mapa...</button>
    </div>
  </aside>

  <main class="mapa-wrapper">
    <div id="map"></div>
  </main>

</div>

<script>
// Ajuste estas variáveis quando configurar seu Worker e Planilha reais
const CONFIG = {
  WORKER_URL: "https://oferenda-digital-api.seu-subdominio.workers.dev",
  SHEET_ID: "SEU_SHEET_ID_AQUI"
};

const ICONES_MAPA = {
  caminhos: '🌾', saude: '🌿', protecao: '🛡️', prosperidade: '🪙', amor: '🌹', gratidao: '✨'
};

let mapa = null;
let markerPreview = null;
let categoriaSelecionada = "caminhos";
let coordenadasSelecionadas = null;

function inicializarMapa() {
  // Centralizado no Brasil por padrão
  mapa = L.map('map', { zoomControl: false }).setView([-14.2350, -51.9253], 4);
  L.control.zoom({ position: 'bottomright' }).addTo(mapa);

  // Mapa com tema Dark escuro e imersivo
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(mapa);

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      mapa.setView([pos.coords.latitude, pos.coords.longitude], 14);
    });
  }

  // Captura o clique do usuário no mapa
  mapa.on('click', (e) => {
    const { lat, lng } = e.latlng;
    coordenadasSelecionadas = { lat, lng };
    atualizarPinoAoVivo();
    definirBotaoEstado("pronto");
  });
}

function atualizarPinoAoVivo() {
  if (!coordenadasSelecionadas) return;
  const emoji = ICONES_MAPA[categoriaSelecionada] || '📍';
  
  const customIcon = L.divIcon({
    html: `<div style="font-size: 30px; filter: drop-shadow(0 0 6px #d4a832); text-align:center;">${emoji}</div>`,
    className: 'custom-pin',
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });

  if (markerPreview) {
    markerPreview.setLatLng([coordenadasSelecionadas.lat, coordenadasSelecionadas.lng]);
    markerPreview.setIcon(customIcon);
  } else {
    markerPreview = L.marker([coordenadasSelecionadas.lat, coordenadasSelecionadas.lng], { icon: customIcon }).addTo(mapa);
  }
  mapa.panTo([coordenadasSelecionadas.lat, coordenadasSelecionadas.lng]);
}

function configurarEventos() {
  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      categoriaSelecionada = e.target.getAttribute("data-cat");
      atualizarPinoAoVivo(); // Muda o ícone na hora se o pino já estiver no mapa
    });
  });

  document.getElementById("btn-acao-principal").addEventListener("click", enviarOferenda);
}

function definirBotaoEstado(estado) {
  const btn = document.getElementById("btn-acao-principal");
  const instrucoes = document.getElementById("status-passo");

  if (estado === "pronto") {
    btn.disabled = false;
    btn.innerHTML = "Firmar Oferenda Virtual 🔥";
    instrucoes.innerHTML = "✨ <b>Local escolhido!</b> Agora descreva seu pedido com fé e clique no botão vermelho abaixo.";
    instrucoes.style.borderLeftColor = "#22c55e";
  } else if (estado === "enviando") {
    btn.disabled = true;
    btn.innerHTML = "Consultando os Guias... 🕯️";
  }
}

async function enviarOferenda() {
  const texto = document.getElementById("pedido-texto").value.trim();
  if (!texto) {
    alert("Por favor, digite sua intenção antes de firmar.");
    return;
  }

  definirBotaoEstado("enviando");

  const idFalso = crypto.randomUUID();
  const mockTextoRitual = `Sua oferenda virtual de ${categoriaSelecionada.toUpperCase()} foi firmada com sucesso no plano astral. Que os guias tragam as respostas e o axé necessário para sua jornada.`;
  const mockElementos = `Vela correspondente à linha, fluidos espirituais e elementos da natureza em formato digital.`;

  try {
    // Tenta enviar para o Worker real
    const res = await fetch(`${CONFIG.WORKER_URL}/classificar`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ texto })
    });
    
    const resultado = await res.json();
    
    if (resultado.aprovado) {
      const novaOferenda = {
        id: idFalso,
        data_criacao: new Date().toISOString(),
        intencao: texto,
        tipo_oferenda: resultado.categoria || categoriaSelecionada,
        latitude: coordenadasSelecionadas.lat,
        longitude: coordenadasSelecionadas.lng,
        texto_ritual: resultado.texto_ritual,
        elementos: resultado.elementos,
        status_ativa: 1
      };

      await fetch(`${CONFIG.WORKER_URL}/salvar`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(novaOferenda)
      });

      exibirSucesso(idFalso, resultado.texto_ritual, resultado.elementos);
    } else {
      alert(resultado.texto_ritual || "Pedido não aceito.");
      window.location.href = `praticantes.html?motivo=recusa`;
    }

  } catch (err) {
    // MODO DE SEGURANÇA: Se o Worker der erro por não estar configurado, roda localmente para você ver o funcionamento visual
    console.log("Worker não configurado ainda. Rodando modo demonstrativo local.");
    exibirSucesso(idFalso, mockTextoRitual, mockElementos);
  }
}

function exibirSucesso(id, ritual, elementos) {
  const urlShare = `${window.location.origin}${window.location.pathname}?id=${id}`;
  markerPreview.bindPopup(`<b>Axé Firmado!</b><br>${ritual}`).openPopup();
  markerPreview = null;

  document.getElementById("painel-fluxo").innerHTML = `
    <div class="sucesso-box">
      <h3 class="cinzel" style="color: var(--gold); margin-bottom: 0.5rem;">Axé Firmado! ✨</h3>
      <p style="font-size: 0.95rem; margin-bottom: 1rem; line-height: 1.4;">${ritual}</p>
      <p style="font-size: 0.8rem; color: var(--text-dim); font-style: italic;">Elementos digitais: ${elementos}</p>
      
      <div style="margin-top: 1.5rem; border-top: 1px solid var(--border); padding-top: 1rem; text-align: left;">
        <label class="mono" style="font-size: 0.7rem; color: var(--gold); display:block; margin-bottom: 0.3rem;">LINK DA OFERENDA (COMPARTILHAMENTO):</label>
        <div class="share-input-group">
          <input type="text" class="share-url" value="${urlShare}" id="share-input" readonly>
          <button class="btn-copy" onclick="copiarLink()">Copiar</button>
        </div>
      </div>
      <button class="btn-firmar" style="margin-top: 1.5rem; background: var(--bg3); border: 1px solid var(--border);" onclick="window.location.reload()">Firmar Outra</button>
    </div>
  `;
}

function copiarLink() {
  const input = document.getElementById("share-input");
  input.select();
  document.execCommand("copy");
  alert("Link de compartilhamento copiado com sucesso!");
}

async function checarLinkCompartilhado() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) return;

  document.getElementById("status-passo").innerHTML = "🔮 <b>Carregando oferenda compartilhada via link...</b>";

  try {
    const res = await fetch(`${CONFIG.WORKER_URL}/buscar-oferenda?id=${id}`);
    const d = await res.json();
    if (d && d.latitude) {
      const lat = parseFloat(d.latitude);
      const lng = parseFloat(d.longitude);
      mapa.setView([lat, lng], 16);
      L.marker([lat, lng], {
        icon: L.divIcon({ html: `<div style="font-size:32px;">${ICONES_MAPA[d.tipo_oferenda] || '✨'}</div>`, iconSize:[32,32] })
      }).addTo(mapa).bindPopup(`<b>Oferenda Compartilhada</b><br>"${d.intencao}"<br><small>${d.texto_ritual}</small>`).openPopup();
    }
  } catch(e) {
    // Fallback de teste se o link veio mas não há Worker
    document.getElementById("status-passo").innerHTML = "ℹ️ Você acessou via link compartilhado. Modo de demonstração ativo.";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  inicializarMapa();
  configurarEventos();
  checarLinkCompartilhado();
});
</script>
</body>
</html>
