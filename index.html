<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Firmando Axé — Oferenda Virtual</title>
<meta name="description" content="Faça sua oferenda virtual com respeito às traditions de Umbanda e Candomblé.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1c1208;--bg2:#261a0a;--bg3:#311f0c;--bg4:#3d2610;
  --border:rgba(220,170,80,.15);--border2:rgba(220,170,80,.30);
  --amber:#e09b30;--amber2:#f5c050;--amber-dim:rgba(224,155,48,.12);
  --terra:#c4572a;--terra2:#e06a38;--cream:#f5ead0;
  --text:#ede0c4;--muted:#8a7458;--green:#5a8a4a;
  --font-head:'Playfair Display',serif;
  --font-body:'Lato',sans-serif;
  --font-mono:'Space Mono',monospace;
  --radius:14px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(200,100,30,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 30% at 80% 100%,rgba(180,80,20,.10) 0%,transparent 50%);pointer-events:none;z-index:0}

/* HEADER */
.header{text-align:center;padding:44px 20px 20px;position:relative;z-index:1}
.header-eyebrow{font-family:var(--font-mono);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--amber);opacity:.75;margin-bottom:10px}
.header h1{font-family:var(--font-head);font-size:clamp(26px,7vw,42px);font-weight:600;font-style:italic;color:var(--cream);text-shadow:0 2px 24px rgba(200,120,30,.35);line-height:1.15}
.header h1 span{color:var(--amber2);font-style:normal}
.header-sub{font-size:14px;color:var(--muted);margin-top:8px;font-weight:300}
.header-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--amber),transparent);margin:16px auto 0;opacity:.5}

/* VELAS */
.candle-row{display:flex;justify-content:center;gap:20px;padding:16px 0 28px;position:relative;z-index:1}
.candle{display:flex;flex-direction:column;align-items:center}
.flame{width:9px;height:16px;background:radial-gradient(ellipse at 50% 80%,#fff8e0 0%,#ffc030 35%,#e06010 75%,transparent 100%);border-radius:50% 50% 25% 25%;animation:flicker 2s ease-in-out infinite alternate;filter:blur(.3px)}
.candle-body{width:11px;height:32px;border-radius:2px}
.candle-body::after{content:'';display:block;width:100%;height:100%;border-radius:2px;background:linear-gradient(90deg,rgba(255,255,255,.12) 0%,transparent 50%)}
.c1 .candle-body,.c5 .candle-body{background:linear-gradient(180deg,#c83020,#7a1810)}
.c2 .candle-body,.c4 .candle-body{background:linear-gradient(180deg,#e8dfc0,#a89870)}
.c3 .candle-body{background:linear-gradient(180deg,#4070c0,#1a3870)}
.c1 .flame{animation-delay:0s}.c2 .flame{animation-delay:.4s}.c3 .flame{animation-delay:.8s}.c4 .flame{animation-delay:.2s}.c5 .flame{animation-delay:.6s}

@keyframes flicker{0%{transform:scaleX(1) scaleY(1);opacity:1}30%{transform:scaleX(.82) scaleY(1.12) translateX(1px);opacity:.9}60%{transform:scaleX(1.12) scaleY(.9) translateX(-1px);opacity:1}100%{transform:scaleX(.95) scaleY(1.05);opacity:.95}}

/* LAYOUT */
.main{max-width:580px;margin:0 auto;padding:0 16px 80px;position:relative;z-index:1}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--amber),transparent);opacity:.3}
.card-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:14px;opacity:.8}

.instrucoes-fluxo {
  background: var(--bg3);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  border-left: 3px solid var(--amber);
  color: var(--text);
  margin-bottom: 14px;
}

/* MAPA */
.mapa-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mapa-dot{width:7px;height:7px;border-radius:50%;background:var(--terra2);animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#mapa{height:280px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.leaflet-tile{filter:sepia(.6) hue-rotate(10deg) brightness(.6) contrast(1.1)}
.leaflet-container{background:var(--bg)!important}
.leaflet-popup-content-wrapper{background:var(--bg2)!important;border:1px solid var(--border2)!important;border-radius:10px!important;color:var(--text)!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:var(--bg2)!important}
.leaflet-popup-close-button{color:var(--muted)!important}
.leaflet-control-zoom a{background:var(--bg2)!important;border-color:var(--border)!important;color:var(--text)!important}

/* TIPOS */
.tipos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.tipo-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 6px;cursor:pointer;text-align:center;transition:all .18s;color:var(--muted);font-family:var(--font-body)}
.tipo-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}
.tipo-btn.active{border-color:var(--amber);background:var(--amber-dim);color:var(--amber2)}
.tipo-icon{font-size:22px;display:block;margin-bottom:4px}
.tipo-name{font-size:11px;line-height:1.3}

/* TEXTAREA */
.pedido-area{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;padding:13px 15px;resize:none;outline:none;min-height:96px;transition:border-color .2s,box-shadow .2s}
.pedido-area::placeholder{color:var(--muted);font-style:italic}
.pedido-area:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(224,155,48,.09)}
.char-count{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:right;margin-top:5px}

/* EMAIL */
.email-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:13px;padding:10px 13px;outline:none;transition:border-color .2s;margin-top:10px}
.email-input::placeholder{color:var(--muted);font-style:italic}
.email-input:focus{border-color:var(--amber)}

/* BTN PRINCIPAL */
.btn-oferenda{width:100%;border:none;border-radius:var(--radius);background:linear-gradient(135deg,#c47820 0%,#8a4e10 100%);color:#1c0e02;font-family:var(--font-head);font-size:15px;font-weight:600;letter-spacing:.03em;padding:15px;cursor:pointer;transition:all .2s;margin-top:14px;position:relative;overflow:hidden}
.btn-oferenda::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#f0a030 0%,#c47820 100%);opacity:0;transition:opacity .2s}
.btn-oferenda:hover::before{opacity:1}
.btn-oferenda:active{transform:scale(.98)}
.btn-oferenda:disabled{opacity:.4;cursor:not-allowed}
.btn-oferenda span{position:relative;z-index:1}

/* LOADING */
.loading-overlay{display:none;text-align:center;padding:32px 20px}
.loading-overlay.active{display:block}
.loading-candle{font-size:36px;animation:sway 2s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.loading-text{font-family:var(--font-head);font-style:italic;font-size:16px;color:var(--amber);margin-top:14px;animation:pulse 2s ease-in-out infinite}
.loading-sub{font-size:12px;color:var(--muted);margin-top:6px}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}

/* RESULTADO */
.resultado{display:none;animation:fadeUp .4s ease}
.resultado.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* OFERENDA VISUAL */
.oferenda-visual{background:linear-gradient(160deg,var(--bg3) 0%,var(--bg2) 100%);border:1px solid var(--border2);border-radius:var(--radius);padding:24px 20px;margin-bottom:14px;text-align:center}
.prato{font-size:56px;margin-bottom:12px;line-height:1;filter:drop-shadow(0 4px 16px rgba(180,100,20,.35))}
.orixas-nome{font-family:var(--font-head);font-style:italic;font-size:14px;color:var(--amber2);letter-spacing:.04em;margin-bottom:10px}
.texto-ritual{font-size:15px;line-height:1.75;color:var(--text);font-weight:300;font-style:italic;border-left:2px solid var(--amber);padding-left:14px;margin:0 auto;text-align:left;max-width:400px}
.elementos-lista{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
.elemento-tag{background:rgba(180,80,20,.15);border:1px solid rgba(200,100,30,.25);border-radius:20px;padding:4px 13px;font-size:12px;color:var(--amber);font-family:var(--font-mono)}
.expira-info{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:center;margin-top:14px;letter-spacing:.04em}
.ia-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(90,138,74,.12);border:1px solid rgba(90,138,74,.25);border-radius:6px;padding:3px 10px;font-size:10px;color:#8abf7a;font-family:var(--font-mono);margin-bottom:14px}

.share-container {
  margin-top: 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 8px;
  text-align: left;
}
.share-title { font-family: var(--font-mono); font-size: 10px; color: var(--amber); margin-bottom: 6px; display: block; }
.share-row { display: flex; gap: 8px; }
.share-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--amber2); font-size: 12px; flex-grow: 1; outline: none; }
.share-btn { background: var(--amber); border: none; padding: 6px 12px; border-radius: 6px; color: #000; font-weight: bold; cursor: pointer; font-size: 12px; }

/* AFILIADOS */
.afiliados-title{font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.afiliados-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.afiliado-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .18s;text-decoration:none;color:inherit;display:block}
.afiliado-item:hover{border-color:var(--border2);transform:translateY(-2px)}
.afiliado-icon{font-size:24px;margin-bottom:5px}
.afiliado-name{font-size:11px;color:var(--muted);line-height:1.3}
.afiliado-price{font-family:var(--font-mono);font-size:10px;color:var(--amber);margin-top:4px}

/* NEGADO */
.negado-card{background:linear-gradient(135deg,rgba(180,60,40,.08) 0%,var(--bg2) 100%);border:1px solid rgba(180,60,40,.25);border-radius:var(--radius);padding:22px 20px;margin-bottom:14px}
.negado-icon{font-size:32px;margin-bottom:10px}
.negado-title{font-family:var(--font-head);font-style:italic;font-size:15px;color:var(--terra2);margin-bottom:10px}
.negado-msg{font-size:14px;color:var(--text);line-height:1.75;font-weight:300;font-style:italic}

/* PRATICANTES */
.praticantes-label{font-size:13px;color:var(--text);font-weight:700;margin-bottom:12px}
.praticante-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;gap:13px;align-items:flex-start;transition:border-color .18s;text-decoration:none;color:inherit;cursor:pointer}
.praticante-card:hover{border-color:var(--border2)}
.praticante-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--bg4),var(--bg3));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.praticante-info{flex:1;min-width:0}
.praticante-nome{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.praticante-tipo{font-size:12px;color:var(--muted);margin-bottom:5px}
.praticante-stars{color:var(--amber);font-size:13px}
.praticante-dist{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:3px}
.praticante-badge{background:var(--amber-dim);border:1px solid rgba(220,170,80,.25);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--amber);font-family:var(--font-mono);white-space:nowrap;flex-shrink:0}

/* BTN NOVA */
.btn-nova{width:100%;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--amber);font-family:var(--font-head);font-style:italic;font-size:14px;padding:13px;cursor:pointer;transition:all .18s;margin-top:10px}
.btn-nova:hover{background:var(--amber-dim);border-color:var(--amber)}

footer{text-align:center;padding:24px 20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);position:relative;z-index:1}
footer a{color:var(--muted);text-decoration:none;transition:color .2s}
footer a:hover{color:var(--amber)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

@media(max-width:400px){.tipos-grid{grid-template-columns:repeat(2,1fr)}.afiliados-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header class="header">
  <div class="header-eyebrow">Umbanda · Candomblé · Axé</div>
  <h1>Firmando <span>Axé</span></h1>
  <p class="header-sub">Oferenda virtual com respeito às tradições de matriz africana</p>
  <div class="header-divider"></div>
</header>

<div class="candle-row" aria-hidden="true">
  <div class="candle c1"><div class="flame"></div><div class="candle-body"></div></div>
  <div class="candle c2"><div class="flame"></div><div class="candle-body"></div></div>
  <div class="candle c3"><div class="flame"></div><div class="candle-body"></div></div>
  <div class="candle c4"><div class="flame"></div><div class="candle-body"></div></div>
  <div class="candle c5"><div class="flame"></div><div class="candle-body"></div></div>
</div>

<div class="main">

  <div style="margin-bottom:16px">
    <div class="mapa-label"><span class="mapa-dot"></span>Oferendas ativas agora</div>
    <div id="mapa"></div>
  </div>

  <div class="card" id="form-card">
    <div class="instrucoes-fluxo" id="txt-fluxo">
      📍 <b>Passo 1:</b> Toque em qualquer local do mapa para marcar onde deseja firmar sua oferenda virtual.
    </div>
    
    <div class="card-label">Faça sua oferenda</div>
    <div class="tipos-grid" id="tipos-grid">
      <button class="tipo-btn active" data-tipo="caminhos" onclick="selecionarTipo(this)"><span class="tipo-icon">🛤️</span><span class="tipo-name">Abertura de Caminhos</span></button>
      <button class="tipo-btn" data-tipo="saude" onclick="selecionarTipo(this)"><span class="tipo-icon">🌿</span><span class="tipo-name">Saúde e Cura</span></button>
      <button class="tipo-btn" data-tipo="amor" onclick="selecionarTipo(this)"><span class="tipo-icon">🌹</span><span class="tipo-name">Amor</span></button>
      <button class="tipo-btn" data-tipo="prosperidade" onclick="selecionarTipo(this)"><span class="tipo-icon">🌻</span><span class="tipo-name">Prosperidade</span></button>
      <button class="tipo-btn" data-tipo="protecao" onclick="selecionarTipo(this)"><span class="tipo-icon">🛡️</span><span class="tipo-name">Proteção</span></button>
      <button class="tipo-btn" data-tipo="gratidao" onclick="selecionarTipo(this)"><span class="tipo-icon">🙏</span><span class="tipo-name">Gratidão</span></button>
    </div>
    <textarea class="pedido-area" id="pedido-texto" maxlength="300"
      placeholder="Escreva seu pedido com sinceridade... (ex: Peço proteção para minha família e abertura de novos caminhos no trabalho)"
      oninput="atualizarContador(this)"></textarea>
    <div class="char-count"><span id="char-n">0</span>/300</div>
    <input type="email" class="email-input" id="email-visitante"
      placeholder="Seu e-mail (opcional) — para avaliar o atendimento depois">
    <button class="btn-oferenda" id="btn-enviar" onclick="enviarPedido()" disabled>
      <span>Aguardando Local do Mapa...</span>
    </button>
  </div>

  <div class="loading-overlay" id="loading">
    <div class
