<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Firmando Axé — Oferenda Digital</title>
<meta name="description" content="Faça sua oferenda virtual com respeito às tradições de Umbanda e Candomblé. Escolha o local no mapa e envie seu pedido.">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght=0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ─── PALETA E ESTILO CUSTOMIZADO DE MATRIZ AFRICANA ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #080705;
  --bg2:       #100e0b;
  --bg3:       #1a1712;
  --border:    rgba(255,220,130,0.12);
  --gold:      #d4a832;
  --gold2:     #f0c84a;
  --white:     #f0ead6;
  --text-dim:  #a09888;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Crimson Pro', serif;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-col: column;
}

.cinzel { font-family: 'Cinzel Decorative', serif; }
.mono { font-family: 'Space Mono', monospace; }

header {
  background: linear-gradient(to bottom, #000, var(--bg2));
  border-bottom: 1px solid var(--border);
  padding: 1.5rem;
  text-align: center;
  position: relative;
}
header h1 { color: var(--gold); font-size: 1.6rem; letter-spacing: 2px; }
header p { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.2rem; }

.app-container {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 1.5rem;
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.5rem;
  flex-grow: 1;
}
@media (min-width: 900px) {
  .app-container { grid-template-columns: 450px 1fr; }
}

/* Painel Lateral */
.painel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  justify-content: space-between;
}

.instrucoes {
  background: var(--bg3);
  padding: 1rem;
  border-radius: 8px;
  font-size: 0.9rem;
  border-left: 3px solid var(--gold);
  color: var(--text-dim);
}

textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  padding: 1rem;
  font-family: inherit;
  font-size: 1rem;
  resize: none;
}
textarea:focus { outline: 1px solid var(--gold); }

/* Seletores de Tipo em Tempo Real */
.categorias-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
}
.cat-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 0.6rem;
  border-radius: 8px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  text-align: center;
  transition: all 0.2s;
}
.cat-btn.active {
  border-color: var(--gold);
  color: var(--gold2);
  background: rgba(212,168,50,0.08);
}

.btn-firmar {
  width: 100%;
  background: linear-gradient(135deg, #8a2518, #4a120b);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--white);
  padding: 1rem;
  border-radius: 12px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  letter-spacing: 1px;
}
.btn-firmar:hover { opacity: 0.9; }
.btn-firmar:disabled { opacity: 0.4; cursor: not-allowed; }

/* Wrapper do Mapa */
.mapa-wrapper {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0.5rem;
  position: relative;
  min-height: 400px;
}
#map {
  width: 100%;
  height: 100%;
  min-height: 450px;
  border-radius: 12px;
  background: #111;
}

/* customização sutil dos popups do mapa */
.leaflet-popup-content-wrapper { background: var(--bg2); color: var(--white); border: 1px solid var(--border); }
.leaflet-popup-tip { background: var(--bg2); }

/* Tela de Sucesso / Compartilhamento */
.sucesso-box {
  background: var(--bg3);
  border: 1px solid var(--gold);
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
}
.share-input-group {
  display: flex;
  margin-top: 1rem;
  gap: 0.5rem;
}
.share-url {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 0.5rem;
  font-size: 0.8rem;
  border-radius: 6px;
  flex-grow: 1;
  color: var(--gold2);
}
.btn-copy {
  background: var(--gold);
  color: var(--bg);
  border: none;
  padding: 0.5rem 1rem;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <h1 class="cinzel">FIRMANDO AXÉ</h1>
  <p>Conectando Fé, Respeito e Tecnologia Ancestral</p>
</header>

<div class="app-container">
  
  <aside class="painel" id="painel-fluxo">
    
    <div class="fluxo-edicao" id="fluxo-dados">
      <h2 class="cinzel" style="color: var(--gold); font-size: 1.2rem; margin-bottom: 0.5rem;">Prepare seu Axé</h2>
      
      <div class="instrucoes mb-3" id="status-passo">
        📍 <b>Passo 1:</b> Escolha o local da oferenda clicando diretamente no mapa.
      </div>

      <div style="margin-bottom: 1rem;">
        <label class="mono" style="font-size: 0.75rem; color: var(--gold); display:block; margin-bottom: 0.4rem;">1. ESCOLHA A VERTENTE (Altera o ícone no mapa)</label>
        <div class="categorias-grid">
          <div class="cat-btn active" data-cat="caminhos">🌾 Caminhos</div>
          <div class="cat-btn" data-cat="saude">🌿 Saúde</div>
          <div class="cat-btn" data-cat="protecao">🛡️ Proteção</div>
          <div class="cat-btn" data-cat="prosperidade">🪙 Fortuna</div>
          <div class="cat-btn" data-cat="amor">🌹 Amor</div>
          <div class="cat-btn" data-cat="gratidãao">✨ Gratidão</div>
        </div>
      </div>

      <div>
        <label class="mono" style="font-size: 0.75rem; color: var(--gold); display:block; margin-bottom: 0.4rem;">2. DIGITE SUA INTENÇÃO COM FÉ</label>
        <textarea id="pedido-texto" rows="5" placeholder="Digite sua prece ou necessidade... Os guias lerão seu coração."></textarea>
      </div>
    </div>

    <div id="acao-container">
      <button class="btn-firmar" id="btn-acao-principal" disabled>Aguardando Localização...</button>
    </div>

  </aside>

  <main class="mapa-wrapper">
    <div id="map"></div>
  </main>

</div>

<script>
// ─── CONFIGURAÇÃO DE AMBIENTE ───
const CONFIG = {
  WORKER_URL: "https://oferenda-digital-api.SEU_SUBDOMINIO.workers.dev",
  SHEET_ID: "SUA_PLANILHA_ID_AQUI"
};

// Emojis/Ícones mapeados por tipo de oferenda
const ICONES_MAPA = {
  caminhos: '🌾',
  saude: '🌿',
  protecao: '🛡️',
  prosperidade: '🪙',
  amor: '🌹',
  gratidao: '✨',
  preview: '📍'
};

// ─── ESTADO GLOBAL DO FRONTEND ───
let mapa = null;
let markerPreview = null; // O pino provisório que o usuário posiciona
let categoriaSelecionada = "caminhos";
let coordenadasSelecionadas = null;

// ─── INICIALIZAÇÃO ───
document.addEventListener("DOMContentLoaded", () => {
  inicializarMapa();
  configurarEventosInterface();
  checarParametrosCompartilhamento();
});

// ─── MOTOR DO MAPA LEAFLET ───
function inicializarMapa() {
  // Inicializa mapa padrão centrado no Brasil
  mapa = L.map('map', { zoomControl: false }).setView([-14.2350, -51.9253], 4);
  L.control.zoom({ position: 'bottomright' }).addTo(mapa);

  // Layout de Mapa Escuro (CartoDB DarkMatter) para casar com a identidade imersiva do projeto
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(mapa);

  // Tenta geolocalizar o celular do usuário para aproximar a visão inicial
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      mapa.setView([pos.coords.latitude, pos.coords.longitude], 14);
    });
  }

  // EVENTO DE CLIQUE NO MAPA: Captura a posição desejada pelo visitante
  mapa.on('click', (e) => {
    const { lat, lng } = e.latlng;
    coordenadasSelecionadas = { lat, lng };
    
    atualizarPinoPreview();
    atualizarBotaoEstado("pronto");
  });
}

// ─── ATUALIZAÇÃO DO PINO EM TEMPO REAL ───
function atualizarPinoPreview() {
  if (!coordenadasSelecionadas) return;

  const emojiIcon = ICONES_MAPA[categoriaSelecionada] || '📍';
  
  // Cria um ícone HTML customizado e renderiza o emoji da vertente selecionada
  const customIcon = L.divIcon({
    html: `<div style="font-size: 28px; filter: drop-shadow(0 0 6px rgba(212,168,50,0.6)); text-align:center;">${emojiIcon}</div>`,
    className: 'custom-pin-preview',
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });

  if (markerPreview) {
    // Se o marcador já existia no mapa, apenas move de lugar e atualiza o emoji na hora
    markerPreview.setLatLng([coordenadasSelecionadas.lat, coordenadasSelecionadas.lng]);
    markerPreview.setIcon(customIcon);
  } else {
    // Se for o primeiro clique, plota o marcador no mapa
    markerPreview = L.marker([coordenadasSelecionadas.lat, coordenadasSelecionadas.lng], { icon: customIcon }).addTo(mapa);
  }

  // Faz o mapa se mover levemente de forma suave até a posição do clique
  mapa.panTo([coordenadasSelecionadas.lat, coordenadasSelecionadas.lng]);
}

// ─── CONFIGURAÇÃO DE EVENTOS DA INTERFACE ───
function configurarEventosInterface() {
  // Cliques para alternar as vertentes de categoria
  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      
      categoriaSelecionada = e.target.getAttribute("data-cat");
      
      // Atualiza o ícone do mapa dinamicamente se o usuário já tiver clicado no mapa
      atualizarPinoPreview();
    });
  });

  // Clique no botão principal de Firmar
  document.getElementById("btn-acao-principal").addEventListener("click", executarFluxoEnvio);
}

// ─── MANIPULAÇÃO DO BOTÃO PRINCIPAL ───
function atualizarBotaoEstado(estado) {
  const btn = document.getElementById("btn-acao-principal");
  const instrucoes = document.getElementById("status-passo");

  if (estado === "pronto") {
    btn.disabled = false;
    btn.innerHTML = "Firmar Oferenda Virtual 🔥";
    instrucoes.innerHTML = "✨ <b>Local Definido!</b> Agora escreva sua intenção de coração e clique no botão abaixo.";
    instrucoes.style.borderLeftColor = "#22c55e"; // Borda verde de validação
  } else if (estado === "enviando") {
    btn.disabled = true;
    btn.innerHTML = "Consultando os Guias... 🕯️";
  }
}

// ─── ENVIO DOS DADOS PARA O WORKER / RITUAL IA ───
async function executarFluxoEnvio() {
  const texto = document.getElementById("pedido-texto").value.trim();
  if (!texto) {
    alert("Por favor, digite sua intenção antes de firmar o axé.");
    return;
  }

  atualizarBotaoEstado("enviando");

  try {
    // 1. Envia para o Cloudflare Worker processar via Gemini API
    const resIA = await fetch(`${CONFIG.WORKER_URL}/classificar`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ texto })
    });

    const resultado = await resIA.json();

    if (resultado.aprovado) {
      // 2. Monta objeto no padrão exato da aba "oferendas" do Sheets
      const novaOferenda = {
        id: crypto.randomUUID(),
        data_criacao: new Date().toISOString(),
        intencao: texto,
        tipo_oferenda: resultado.categoria || categoriaSelecionada,
        latitude: coordenadasSelecionadas.lat,
        longitude: coordenadasSelecionadas.lng,
        texto_ritual: resultado.texto_ritual,
        elementos: resultado.elementos,
        status_ativa: 1
