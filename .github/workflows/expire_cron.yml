name: Manutenção Diária — Firmando Axé

on:
  schedule:
    - cron: "0 3 * * *"   # 00:00 BRT (UTC-3)
  workflow_dispatch:

jobs:
  manutencao:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-gspread
      - run: pip install -r backend/requirements.txt
      - name: Rodar manutenção
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python backend/expire_oferendas.py
